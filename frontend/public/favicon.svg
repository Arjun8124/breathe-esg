<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f0fdfa" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="vein" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="24" y="24" width="464" height="464" rx="92" ry="92" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Leaf shape — tilted, organic, representing sustainability -->
  <path d="
    M 256 108
    C 172 108, 108 180, 108 264
    C 108 340, 160 396, 240 404
    Q 248 405, 256 404
    C 336 396, 404 340, 404 264
    C 404 180, 340 108, 256 108
    Z
  " fill="url(#leaf)"/>

  <!-- Central vein of the leaf -->
  <path d="
    M 256 148
    C 256 148, 256 280, 256 380
  " fill="none" stroke="url(#vein)" stroke-width="6" stroke-linecap="round"/>

  <!-- Side veins — left -->
  <path d="M 256 220 Q 220 200, 175 210" fill="none" stroke="url(#vein)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 256 270 Q 210 250, 155 268" fill="none" stroke="url(#vein)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 256 320 Q 220 305, 180 320" fill="none" stroke="url(#vein)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Side veins — right -->
  <path d="M 256 220 Q 292 200, 337 210" fill="none" stroke="url(#vein)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 256 270 Q 302 250, 357 268" fill="none" stroke="url(#vein)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 256 320 Q 292 305, 332 320" fill="none" stroke="url(#vein)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Small rising bar chart inside the leaf — representing data/ESG metrics -->
  <rect x="208" y="330" width="20" height="38" rx="4" fill="url(#vein)" opacity="0.6"/>
  <rect x="236" y="314" width="20" height="54" rx="4" fill="url(#vein)" opacity="0.7"/>
  <rect x="264" y="322" width="20" height="46" rx="4" fill="url(#vein)" opacity="0.65"/>
  <rect x="292" y="306" width="20" height="62" rx="4" fill="url(#vein)" opacity="0.75"/>
</svg>